name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsndfile1-dev libfftw3-dev
    
    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release
    
    - name: Build
      run: cmake --build build --parallel
    
    - name: Run tests
      run: ctest --test-dir build --output-on-failure

  build-macos:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: brew install libsndfile fftw pkg-config
    
    - name: Configure CMake
      run: |
        # Set Homebrew paths for Apple Silicon and Intel
        export HOMEBREW_PREFIX="$(brew --prefix)"
        export PKG_CONFIG_PATH="$HOMEBREW_PREFIX/lib/pkgconfig:$PKG_CONFIG_PATH"
        cmake -B build -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_PREFIX_PATH="$HOMEBREW_PREFIX" \
          -DCMAKE_LIBRARY_PATH="$HOMEBREW_PREFIX/lib" \
          -DCMAKE_INCLUDE_PATH="$HOMEBREW_PREFIX/include"
    
    - name: Build
      run: cmake --build build --parallel
    
    - name: Run tests
      run: ctest --test-dir build --output-on-failure
